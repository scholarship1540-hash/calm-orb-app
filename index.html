<script>

const video = document.getElementById("camera");

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });

    video.srcObject = stream;
    video.play();

    console.log("Camera started successfully");

  } catch (err) {
    console.error("Camera error:", err);
    alert("Camera permission denied or browser blocked it.");
  }
}

window.addEventListener("DOMContentLoaded", startCamera);


/* ===== STRESS SYSTEM ===== */

let stress = 40;
let voiceUnlocked = false;
let highTriggered = false;

const stressText = document.getElementById("stressText");

function updateStress() {
  stressText.innerText = stress + "%";

  if (stress >= 70 && !highTriggered) {
    highTriggered = true;
    speak("Your stress level is high. Please start a calming activity now.");
  }

  if (stress < 60) {
    highTriggered = false;
  }
}

function increaseStress() {
  stress += 10;
  if (stress > 100) stress = 100;
  updateStress();
}


/* ===== VOICE ===== */

document.body.addEventListener("click", () => {
  if (!voiceUnlocked) {
    speechSynthesis.speak(new SpeechSynthesisUtterance("System ready"));
    voiceUnlocked = true;
  }
}, { once: true });

function speak(text) {
  if (!voiceUnlocked) return;

  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.rate = 0.9;
  speechSynthesis.speak(msg);
}

updateStress();

</script>
