<!DOCTYPE html>
<html>
<head>
<title>AI Stress Monitor</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex flex-col items-center min-h-screen">

<h1 class="text-4xl mt-6 mb-4">AI Stress Monitor</h1>

<!-- CAMERA -->
<video id="camera" autoplay playsinline class="w-80 rounded-lg border border-blue-500"></video>

<div class="mt-6 text-2xl">
Stress Level: <span id="stressValue">40</span>%
</div>

<p id="statusText" class="mt-2 text-gray-400">Monitoring stress...</p>

<!-- ACTIVITY SCREEN -->
<div id="activityScreen" class="hidden mt-8 text-center">
<h2 class="text-3xl mb-4">Breathing Exercise</h2>
<p id="breathText" class="text-xl">Inhale slowly...</p>
</div>

<script>

let stressLevel = 40;
let voiceReady = false;
let activityStarted = false;

/* ================= CAMERA ================= */

const video = document.getElementById("camera");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    alert("Camera permission denied");
});

/* ================= VOICE UNLOCK ================= */

document.body.addEventListener("click", () => {
    if (!voiceReady) {
        const unlock = new SpeechSynthesisUtterance("Monitoring started");
        speechSynthesis.speak(unlock);
        voiceReady = true;
    }
}, { once: true });

function speak(text) {
    if (!voiceReady) return;
    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    speechSynthesis.speak(msg);
}

/* ================= STRESS AUTO INCREASE ================= */

function updateStress() {
    document.getElementById("stressValue").textContent = stressLevel;

    if (stressLevel >= 70 && !activityStarted) {
        startActivity();
    }
}

setInterval(() => {
    if (!activityStarted) {
        stressLevel += 5;
        if (stressLevel > 100) stressLevel = 100;
        updateStress();
    }
}, 3000);

/* ================= ACTIVITY ================= */

function startActivity() {

    activityStarted = true;

    document.getElementById("activityScreen").classList.remove("hidden");
    document.getElementById("statusText").textContent = "High stress detected!";

    speak("Your stress is high. Please breathe slowly with me.");

    let phases = ["Inhale slowly...", "Hold...", "Exhale slowly..."];
    let index = 0;

    let interval = setInterval(() => {
        document.getElementById("breathText").textContent = phases[index];
        index++;

        if (index > 2) {
            clearInterval(interval);

            stressLevel -= 30;
            if (stressLevel < 0) stressLevel = 0;

            activityStarted = false;
            document.getElementById("activityScreen").classList.add("hidden");
            document.getElementById("statusText").textContent = "Monitoring stress...";
            updateStress();
        }
    }, 3000);
}

updateStress();

</script>
</body>
</html>
