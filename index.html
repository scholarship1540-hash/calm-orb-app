<!DOCTYPE html>
<html>
<head>
  <title>AI Stress Monitor</title>
  <link rel="stylesheet" href="style.css">

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body>

  <!-- MONITOR SECTION -->
  <div class="container" id="monitor">
    <h1>AI Stress Monitor</h1>

    <video id="camera" autoplay muted playsinline width="320"></video>

    <div class="orb"></div>

    <h2 id="stressValue">Stress Level: 0%</h2>
    <p id="instruction">Initializing camera...</p>
  </div>

  <!-- ACTIVITY SECTION -->
  <div id="activity" style="display:none;">
    <h1>Release Your Thoughts</h1>

    <div id="thoughtContainer"></div>

    <h3>Released: <span id="releasedCount">0</span>/5</h3>
  </div>

  <script defer src="script.js"></script>
</body>
</html>
