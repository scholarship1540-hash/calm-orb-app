<!DOCTYPE html>
<html>
<head>
  <title>AI Stress Monitor</title>
  <link rel="stylesheet" href="style.css">

  <!-- MediaPipe -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body>

<!-- MONITOR SECTION -->
<div class="container" id="monitor">
  <h1>AI Stress Monitor</h1>

  <video id="camera" autoplay muted playsinline width="320"></video>

  <div class="orb"></div>

  <h2 id="stressValue">Stress Level: 0%</h2>
  <p id="instruction">Initializing camera...</p>
</div>

<!-- ACTIVITY SECTION -->
<div id="activity" style="display:none;">

  <!-- MENU -->
  <div id="activityMenu">
    <h1>Choose Activity</h1>
    <button onclick="startBreathing()">🧘 Breathing Exercise</button>
    <button onclick="startThoughts()">🧠 Release Thoughts</button>
  </div>

  <!-- BREATHING -->
  <div id="breathingSection" style="display:none;">
    <h1>Breathing Exercise</h1>
    <div class="breathing-circle"></div>
    <p id="breathingText">Breathe In...</p>
  </div>

  <!-- THOUGHTS -->
  <div id="thoughtSection" style="display:none;">
    <h1>Release Your Thoughts</h1>
    <div id="thoughtContainer"></div>
    <h3>Released: <span id="releasedCount">0</span>/5</h3>
  </div>

</div>

<script defer src="script.js"></script>
</body>
</html>
