<!DOCTYPE html>
<html>
<head>
  <title>AI Stress Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>AI Stress Monitor</h1>

  <!-- CAMERA -->
  <video id="camera" autoplay playsinline></video>

  <!-- STRESS DISPLAY -->
  <h2>Stress Level: <span id="stressValue">40</span>%</h2>

  <button id="increaseBtn">Increase Stress</button>

  <!-- ACTIVITY -->
  <div id="activity">
    <h2>Breathing Activity</h2>
    <p id="breathText">Inhale...</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
