<!DOCTYPE html>
<html>
<head>
<title>AI Stress Monitor</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex flex-col items-center min-h-screen">

<h1 class="text-4xl mt-6 mb-4">AI Stress Monitor</h1>

<!-- CAMERA -->
<video id="camera" autoplay playsinline class="w-80 rounded-lg border border-blue-500"></video>

<!-- STRESS DISPLAY -->
<div class="mt-6 text-2xl">
Stress Level: <span id="stressValue">40</span>%
</div>

<!-- HOME SCREEN -->
<div id="homeScreen" class="mt-6">
<button id="increaseStress" class="bg-red-600 px-6 py-2 rounded">
Simulate Stress
</button>
</div>

<!-- ACTIVITY SCREEN -->
<div id="activityScreen" class="hidden mt-8 text-center">
<h2 class="text-3xl mb-4">Breathing Exercise</h2>
<p id="breathText" class="text-xl">Inhale...</p>
</div>

<script>

let stressLevel = 40;
let voiceEnabled = false;

/* ================= CAMERA ================= */

const video = document.getElementById("camera");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    alert("Camera permission denied");
});

/* ================= VOICE ================= */

document.body.addEventListener("click", () => {
    if (!voiceEnabled) {
        const unlock = new SpeechSynthesisUtterance("Voice enabled");
        speechSynthesis.speak(unlock);
        voiceEnabled = true;
    }
}, { once: true });

function speak(text) {
    if (!voiceEnabled) return;
    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    speechSynthesis.speak(msg);
}

/* ================= STRESS UPDATE ================= */

function updateStress() {
    document.getElementById("stressValue").textContent = stressLevel;

    if (stressLevel >= 70) {
        startActivity();
    }
}

/* ================= SIMULATE STRESS ================= */

document.getElementById("increaseStress").onclick = () => {
    stressLevel += 15;
    if (stressLevel > 100) stressLevel = 100;
    updateStress();
};

/* ================= ACTIVITY ================= */

function startActivity() {

    document.getElementById("homeScreen").classList.add("hidden");
    document.getElementById("activityScreen").classList.remove("hidden");

    speak("Your stress level is high. Follow this breathing exercise.");

    let phases = ["Inhale slowly...", "Hold...", "Exhale slowly..."];
    let index = 0;

    let interval = setInterval(() => {
        document.getElementById("breathText").textContent = phases[index];
        index++;

        if (index > 2) {
            clearInterval(interval);
            stressLevel -= 30;
            if (stressLevel < 0) stressLevel = 0;
            updateStress();
        }
    }, 3000);
}

updateStress();

</script>
</body>
</html>
